---
# Deploy secrets.env to ~/.fleet-env and source it from .bashrc.

- name: Deploy secrets env file
  ansible.builtin.copy:
    src: "{{ secrets_env_path }}"
    dest: "/home/{{ ssh_user }}/.fleet-env"
    owner: "{{ ssh_user }}"
    mode: "0600"
  when: secrets_env_path is defined

- name: Source fleet-env from bashrc
  ansible.builtin.lineinfile:
    path: "/home/{{ ssh_user }}/.bashrc"
    line: '[ -f ~/.fleet-env ] && source ~/.fleet-env'
    state: present
  become: true
  become_user: "{{ ssh_user }}"
