<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Open Fleet</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --cyan: #39d2c0;
    --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .auth-section { display: flex; align-items: center; gap: 8px; }
  header input {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 13px;
    width: 180px;
  }
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 280px 1fr;
    overflow: hidden;
  }
  @media (max-width: 640px) {
    .main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .sidebar { max-height: 40vh; }
  }

  /* Sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section {
    padding: 12px 16px 8px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }
  .worker-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px;
  }
  .worker-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  .worker-item:hover { background: var(--bg3); }
  .worker-item.selected { background: var(--bg3); border: 1px solid var(--border); }
  .worker-item .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .worker-item .name { flex: 1; }
  .worker-item .status-label { font-size: 12px; color: var(--text-dim); }
  .dot-idle { background: var(--green); }
  .dot-working { background: var(--yellow); }
  .dot-spawning, .dot-provisioning { background: var(--cyan); }
  .dot-errored { background: var(--red); }
  .dot-stopped { background: var(--text-dim); }

  .sidebar-actions { padding: 12px; border-top: 1px solid var(--border); }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg3);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }

  .task-list {
    overflow-y: auto;
    max-height: 160px;
    padding: 0 8px 8px;
  }
  .task-item {
    font-size: 12px;
    padding: 4px 10px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .task-running { color: var(--yellow); }
  .task-completed { color: var(--green); }
  .task-failed { color: var(--red); }

  /* Detail panel */
  .detail {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .detail-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 14px;
  }
  .worker-info {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
  }
  .info-item { font-size: 13px; }
  .info-item .label { color: var(--text-dim); font-size: 11px; }
  .info-item .value { font-weight: 500; }

  .log-panel {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    background: var(--bg);
  }

  .prompt-bar {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
  }
  .prompt-bar input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
  }
  .prompt-bar input:focus { outline: none; border-color: var(--accent); }
  .prompt-bar .btn { white-space: nowrap; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    min-width: 340px;
    max-width: 90vw;
  }
  .modal h2 { font-size: 16px; margin-bottom: 16px; }
  .modal .field { margin-bottom: 12px; }
  .modal label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
  .modal input, .modal select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 13px;
  }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
</style>
</head>
<body>

<header>
  <h1>Open Fleet</h1>
  <div class="auth-section">
    <input id="tokenInput" type="password" placeholder="API token (if required)">
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">Workers</div>
    <div class="worker-list" id="workerList"></div>

    <div class="sidebar-actions">
      <button class="btn" id="spawnBtn">+ Spawn</button>
    </div>

    <div class="sidebar-section">Tasks</div>
    <div class="task-list" id="taskList"></div>
  </div>

  <div class="detail" id="detailPanel">
    <div class="detail-empty" id="emptyState">Select a worker to view details</div>
  </div>
</div>

<!-- Spawn modal -->
<div class="modal-overlay" id="spawnModal">
  <div class="modal">
    <h2>Spawn Worker</h2>
    <div class="field">
      <label>Name</label>
      <input id="spawnName" placeholder="my-worker">
    </div>
    <div class="field">
      <label>VM Type</label>
      <select id="spawnVmType">
        <option value="">regular (default)</option>
        <option value="snp">snp (AMD SEV-SNP)</option>
        <option value="tdx">tdx (Intel TDX)</option>
      </select>
    </div>
    <div class="field">
      <label>Model (optional)</label>
      <input id="spawnModel" placeholder="claude-opus-4-6">
    </div>
    <div class="field">
      <label>Instance Type (optional)</label>
      <input id="spawnInstance" placeholder="Standard_D2s_v5">
    </div>
    <div class="actions">
      <button class="btn" id="spawnCancelBtn">Cancel</button>
      <button class="btn" id="spawnConfirmBtn">Spawn</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  const $ = (sel) => document.querySelector(sel);
  let selectedWorker = null;
  let logSource = null;

  const STATUS_DOT_CLASS = {
    idle: 'dot-idle', working: 'dot-working',
    spawning: 'dot-spawning', provisioning: 'dot-provisioning',
    errored: 'dot-errored', stopped: 'dot-stopped',
  };

  // --- Token ---

  function getToken() {
    return localStorage.getItem('fleet_token') || $('#tokenInput').value || '';
  }

  $('#tokenInput').addEventListener('change', function(e) {
    localStorage.setItem('fleet_token', e.target.value);
  });

  const saved = localStorage.getItem('fleet_token');
  if (saved) $('#tokenInput').value = saved;

  // --- API helper ---

  async function api(path, opts) {
    opts = opts || {};
    const token = getToken();
    const headers = opts.headers || {};
    if (token) headers['Authorization'] = 'Bearer ' + token;
    if (opts.body && typeof opts.body === 'object') {
      headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(opts.body);
    }
    const res = await fetch('/api' + path, Object.assign({}, opts, { headers: headers }));
    if (res.status === 401) {
      $('#tokenInput').focus();
      throw new Error('Authentication required');
    }
    if (!res.ok) {
      const err = await res.json().catch(function() { return { detail: res.statusText }; });
      throw new Error(err.detail || 'Request failed');
    }
    return res.json();
  }

  // --- DOM helpers ---

  function el(tag, attrs, children) {
    const node = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach(function(k) {
        if (k === 'className') node.className = attrs[k];
        else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
        else node.setAttribute(k, attrs[k]);
      });
    }
    if (children) {
      if (!Array.isArray(children)) children = [children];
      children.forEach(function(c) {
        if (typeof c === 'string') node.appendChild(document.createTextNode(c));
        else if (c) node.appendChild(c);
      });
    }
    return node;
  }

  // --- Worker list ---

  async function refreshWorkers() {
    try {
      const workers = await api('/workers');
      const list = $('#workerList');
      list.replaceChildren();

      workers.forEach(function(w) {
        const item = el('div', {
          className: 'worker-item' + (selectedWorker === w.name ? ' selected' : ''),
          onClick: function() { selectWorker(w.name); }
        }, [
          el('span', { className: 'dot ' + (STATUS_DOT_CLASS[w.status] || '') }),
          el('span', { className: 'name' }, w.name),
          el('span', { className: 'status-label' }, w.status),
        ]);
        list.appendChild(item);
      });
    } catch (e) {
      // silently retry next cycle
    }
  }

  // --- Task list ---

  async function refreshTasks() {
    try {
      const tasks = await api('/tasks');
      const list = $('#taskList');
      list.replaceChildren();

      tasks.forEach(function(t) {
        const children = [
          el('span', { className: 'task-' + t.status }, t.status),
          el('span', null, ' ' + t.operation + ' ' + t.worker_name),
        ];
        if (t.error) {
          children.push(el('span', { style: 'color:var(--red)' }, t.error));
        }
        list.appendChild(el('div', { className: 'task-item' }, children));
      });
    } catch (e) {}
  }

  // --- Worker detail ---

  function buildInfoItem(label, value) {
    return el('div', { className: 'info-item' }, [
      el('div', { className: 'label' }, label),
      el('div', { className: 'value' }, value || '\u2014'),
    ]);
  }

  async function selectWorker(name) {
    selectedWorker = name;
    await refreshWorkers();

    const detail = $('#detailPanel');
    detail.replaceChildren();

    const infoPanel = el('div', { className: 'worker-info', id: 'workerInfo' }, 'Loading...');
    const logPanel = el('div', { className: 'log-panel', id: 'logOutput' }, 'Connecting...');

    const promptInput = el('input', { id: 'promptInput', placeholder: 'Send a prompt...' });
    promptInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendPrompt(); });

    const sendBtn = el('button', { className: 'btn', onClick: sendPrompt }, 'Send');
    const killBtn = el('button', { className: 'btn btn-danger', onClick: killWorker }, 'Kill');
    const promptBar = el('div', { className: 'prompt-bar' }, [promptInput, sendBtn, killBtn]);

    detail.appendChild(infoPanel);
    detail.appendChild(logPanel);
    detail.appendChild(promptBar);

    // Fetch detail
    try {
      const info = await api('/workers/' + name);
      infoPanel.replaceChildren();
      infoPanel.appendChild(buildInfoItem('Name', info.name));
      infoPanel.appendChild(buildInfoItem('Status', info.status));
      infoPanel.appendChild(buildInfoItem('IP', info.ip));
      infoPanel.appendChild(buildInfoItem('Model', info.model));
      infoPanel.appendChild(buildInfoItem('VM Type', info.vm_type));
      infoPanel.appendChild(buildInfoItem('SKU', info.instance_type));
      infoPanel.appendChild(buildInfoItem('Tmux', info.tmux_alive ? 'alive' : 'dead'));
      infoPanel.appendChild(buildInfoItem('Uptime', info.uptime));
    } catch (e) {
      infoPanel.textContent = e.message;
    }

    connectLogs(name);
  }

  function connectLogs(name) {
    if (logSource) { logSource.close(); logSource = null; }
    const token = getToken();
    const url = '/api/workers/' + encodeURIComponent(name) + '/logs' +
      (token ? '?token=' + encodeURIComponent(token) : '');
    logSource = new EventSource(url);

    logSource.addEventListener('logs', function(e) {
      var data = JSON.parse(e.data);
      var panel = $('#logOutput');
      if (panel) {
        panel.textContent = data.content;
        panel.scrollTop = panel.scrollHeight;
      }
    });

    logSource.addEventListener('status', function(e) {
      var data = JSON.parse(e.data);
      if (data.idle) {
        var items = document.querySelectorAll('#workerInfo .info-item');
        if (items.length > 1) {
          var val = items[1].querySelector('.value');
          if (val) val.textContent = 'idle';
        }
      }
    });

    logSource.addEventListener('error', function() {
      var panel = $('#logOutput');
      if (panel && panel.textContent === 'Connecting...') {
        panel.textContent = 'Connection failed. Retrying...';
      }
    });
  }

  // --- Actions ---

  async function sendPrompt() {
    var input = $('#promptInput');
    if (!input) return;
    var prompt = input.value.trim();
    if (!prompt || !selectedWorker) return;

    input.value = '';
    try {
      await api('/workers/' + selectedWorker + '/ask', {
        method: 'POST',
        body: { prompt: prompt },
      });
    } catch (e) {
      alert('Failed to send prompt: ' + e.message);
    }
  }

  async function killWorker() {
    if (!selectedWorker) return;
    if (!confirm('Destroy worker "' + selectedWorker + '"?')) return;

    try {
      await api('/workers/' + selectedWorker, { method: 'DELETE' });
      if (logSource) { logSource.close(); logSource = null; }
      selectedWorker = null;
      var detail = $('#detailPanel');
      detail.replaceChildren();
      detail.appendChild(el('div', { className: 'detail-empty' }, 'Worker destroyed. Select another.'));
      refreshWorkers();
      refreshTasks();
    } catch (e) {
      alert('Failed to kill worker: ' + e.message);
    }
  }

  // --- Spawn modal ---

  $('#spawnBtn').addEventListener('click', function() {
    $('#spawnModal').classList.add('open');
    $('#spawnName').focus();
  });

  $('#spawnCancelBtn').addEventListener('click', function() {
    $('#spawnModal').classList.remove('open');
  });

  $('#spawnConfirmBtn').addEventListener('click', async function() {
    var name = $('#spawnName').value.trim();
    if (!name) { alert('Name is required'); return; }

    var body = { name: name };
    var vmType = $('#spawnVmType').value;
    var model = $('#spawnModel').value.trim();
    var instance = $('#spawnInstance').value.trim();
    if (vmType) body.vm_type = vmType;
    if (model) body.model = model;
    if (instance) body.instance_type = instance;

    try {
      await api('/workers', { method: 'POST', body: body });
      $('#spawnModal').classList.remove('open');
      $('#spawnName').value = '';
      refreshWorkers();
      refreshTasks();
    } catch (e) {
      alert('Failed to spawn: ' + e.message);
    }
  });

  // --- Polling ---

  refreshWorkers();
  refreshTasks();
  setInterval(refreshWorkers, 5000);
  setInterval(refreshTasks, 5000);
})();
</script>
</body>
</html>
