# Claude Fleet configuration
# Docs: see DESIGN.md for full schema

# Anthropic auth — set this or use ANTHROPIC_API_KEY env var
anthropic_api_key: ""

# Default model for workers
model: claude-opus-4-6

# Secrets env file — contents get written to ~/.cfleet-env on each worker
secrets_env: ~/.cfleet/secrets.env

# Git repos — cloned read-only into every worker at /workspace/repos/<name>/
repos: []
  # - name: myapp
  #   url: https://github.com/me/myapp.git
  #   branch: main

# Skills directory — copied to ~/.claude/skills/ on workers
skills_dir: ~/.cfleet/skills/

# CLAUDE.md — copied to /workspace/CLAUDE.md on workers
claude_md: ~/.cfleet/CLAUDE.md

# MCP servers config — copied to ~/.claude/mcp-servers.json on workers
mcp_config: ~/.cfleet/mcp-servers.json

# Pulumi config
pulumi:
  project: claude-fleet
  stack: default
  backend: "file://~/.cfleet/pulumi-state"

# Cloud provider config
cloud:
  provider: azure
  region: westeurope
  instance_type: Standard_D2s_v5
  ssh_key: ~/.ssh/id_ed25519
  ssh_user: azureuser
  azure:
    subscription_id: ""
    resource_group: fleet-workers
    image:
      publisher: Canonical
      offer: ubuntu-24_04-lts
      sku: server
      version: latest
