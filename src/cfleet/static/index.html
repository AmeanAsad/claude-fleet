<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2b2a27">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Claude Fleet</title>
<link rel="manifest" href="/manifest.json">
<style>
@font-face {
  font-family: 'Anthropic Sans';
  src: url('https://cdn.prod.website-files.com/67ce28cfec624e2b733f8a52/69971a00a3295036497e1a28_AnthropicSans-Roman-Web.woff2') format('woff2');
  font-weight: 300 800;
  font-style: normal;
  font-display: swap;
}
</style>
<style>
/* ── Variables ─────────────────────────────────────────── */
:root {
  --accent: #c4633a;
  --accent-dim: #ae5630;
  --accent-bright: #d97757;
  --accent-glow: rgba(196,99,58,0.08);
  --accent-glow-strong: rgba(196,99,58,0.18);
  --bg: #1f1e1b;
  --surface: #2b2a27;
  --surface-2: #393937;
  --surface-3: #45443f;
  --border: rgba(108,106,96,0.25);
  --border-light: rgba(108,106,96,0.50);
  --text: #eeeeee;
  --text-dim: #9a9893;
  --text-bright: #eeeeee;
  --green: #86e89a;
  --yellow: #ffdf61;
  --red: #df6666;
  --cyan: #7ab8ff;
  --font-mono: 'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace;
}
/* ── Reset ─────────────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:'Anthropic Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
button{font:inherit;cursor:pointer}
input,select{font:inherit}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-light)}

/* ── Header ────────────────────────────────────────────── */
.header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;min-height:48px}
.header-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;color:var(--accent-bright);letter-spacing:-0.3px;white-space:nowrap}
.header-logo svg{flex-shrink:0}
.header-spacer{flex:1}
.fleet-cost{font-size:12px;color:var(--text-dim);font-family:var(--font-mono);white-space:nowrap}
.fleet-cost b{color:var(--accent);font-weight:600}
.token-input{background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:12px;width:140px}
.token-input:focus{outline:none;border-color:var(--accent-dim)}
.back-btn{display:none;background:none;border:none;color:var(--accent);font-size:14px;padding:4px 8px}

/* ── Layout ────────────────────────────────────────────── */
.layout{flex:1;display:grid;grid-template-columns:280px 1fr;overflow:hidden}

/* ── Sidebar ───────────────────────────────────────────── */
.sidebar{display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--surface);overflow:hidden}
.sidebar-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px}
.sidebar-head span{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-dim)}
.spawn-btn{background:var(--accent-glow);border:1px solid var(--accent-dim);color:var(--accent);font-size:12px;padding:3px 10px;border-radius:6px;font-weight:500;transition:all .15s}
.spawn-btn:hover{background:var(--accent-glow-strong);border-color:var(--accent)}
.worker-list{flex:1;overflow-y:auto;padding:4px 8px}
.worker-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;transition:background .12s;border:1px solid transparent}
.worker-item:hover{background:var(--surface-2)}
.worker-item.active{background:var(--accent-glow);border-color:var(--border-light)}
.worker-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .4s}
.dot-idle{background:var(--green)}
.dot-working{background:var(--yellow);animation:pulse 1.5s ease-in-out infinite}
.dot-spawning,.dot-provisioning{background:var(--cyan);animation:pulse 1s ease-in-out infinite}
.dot-errored{background:var(--red)}
.dot-stopped{background:var(--text-dim)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.worker-info-col{flex:1;min-width:0}
.worker-name{font-weight:500;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.worker-meta{font-size:11px;color:var(--text-dim);margin-top:1px}
.worker-cost{font-size:11px;color:var(--accent-dim);font-family:var(--font-mono);flex-shrink:0}
.sidebar-footer{padding:10px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--text-dim)}
.sidebar-footer b{color:var(--accent)}

/* tasks */
.task-section{border-top:1px solid var(--border);max-height:140px;overflow-y:auto}
.task-section .sidebar-head{padding-top:8px;padding-bottom:4px}
.task-item{font-size:11px;padding:3px 14px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
.task-item .status{font-weight:500}
.task-item .status-running{color:var(--yellow)}
.task-item .status-completed{color:var(--green)}
.task-item .status-failed{color:var(--red)}

/* ── Detail Panel ──────────────────────────────────────── */
.detail{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.detail-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text-dim);font-size:14px;padding:20px}
.detail-empty svg{opacity:.3}

/* Worker bar */
.worker-bar{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap}
.worker-bar-name{font-weight:600;font-size:14px;color:var(--text-bright)}
.worker-bar-status{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.status-idle{background:rgba(134,232,154,.12);color:var(--green)}
.status-working{background:rgba(255,223,97,.12);color:var(--yellow)}
.status-spawning,.status-provisioning{background:rgba(122,184,255,.12);color:var(--cyan)}
.status-errored{background:rgba(223,102,102,.12);color:var(--red)}
.worker-bar-spacer{flex:1}
.worker-bar-stat{font-size:11px;color:var(--text-dim);font-family:var(--font-mono)}
.worker-bar-stat b{color:var(--accent);font-weight:500}
.bar-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font-size:12px;padding:4px 10px;border-radius:6px;transition:all .15s}
.bar-btn:hover{border-color:var(--text);color:var(--text)}
.bar-btn-danger:hover{border-color:var(--red);color:var(--red)}
.bar-btn-warn:hover{border-color:var(--yellow);color:var(--yellow)}

/* Info row (expandable) */
.info-row{display:none;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--surface-2);gap:16px;flex-wrap:wrap;font-size:12px}
.info-row.open{display:flex}
.info-chip{color:var(--text-dim)}
.info-chip b{color:var(--text);font-weight:500}

/* ── Messages ──────────────────────────────────────────── */
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:4px}
.msg{padding:8px 0;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg-user{border-left:3px solid var(--accent);padding-left:12px;margin:8px 0 4px}
.msg-user .msg-body{color:var(--text-bright);font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.msg-assistant .msg-text{font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg-assistant .msg-text code{background:var(--surface-3);padding:1px 5px;border-radius:3px;font-family:var(--font-mono);font-size:12px}
.msg-assistant .msg-text pre{background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin:8px 0;overflow-x:auto;font-family:var(--font-mono);font-size:12px;line-height:1.5}
.msg-assistant .msg-text pre code{background:none;padding:0}

/* thinking */
.thinking-block{margin:4px 0;border-left:2px solid var(--border);padding-left:10px}
.thinking-block summary{font-size:11px;color:var(--text-dim);cursor:pointer;user-select:none;font-style:italic}
.thinking-block summary:hover{color:var(--text)}
.thinking-block .thinking-content{font-size:12px;color:var(--text-dim);font-style:italic;line-height:1.5;white-space:pre-wrap;margin-top:4px;max-height:300px;overflow-y:auto}

/* tool use */
.tool-use{display:flex;align-items:center;gap:6px;margin:4px 0;padding:5px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;font-family:var(--font-mono);font-size:12px;overflow:hidden}
.tool-name{color:var(--cyan);font-weight:600;flex-shrink:0}
.tool-cmd{color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* tool result */
.tool-result{margin:2px 0;font-size:12px}
.tool-result summary{color:var(--text-dim);cursor:pointer;font-size:11px;font-family:var(--font-mono)}
.tool-result summary:hover{color:var(--text)}
.tool-result pre{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:8px;margin-top:4px;font-family:var(--font-mono);font-size:11px;line-height:1.4;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;color:var(--text-dim)}
.tool-error summary{color:var(--red)}
.tool-error pre{border-color:rgba(223,102,102,.2);color:var(--red)}

/* result summary */
.msg-result{text-align:center;padding:4px 0;margin:4px 0}
.result-line{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-family:var(--font-mono);color:var(--text-dim);padding:3px 12px;background:var(--surface-2);border-radius:10px}
.result-line .cost{color:var(--accent)}

/* system */
.msg-system{font-size:11px;color:var(--text-dim);padding:2px 0;font-style:italic}

/* ── Prompt Bar ────────────────────────────────────────── */
.prompt-bar{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.prompt-input{flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:14px;resize:none;min-height:42px;max-height:120px;line-height:1.4}
.prompt-input:focus{outline:none;border-color:var(--accent-dim);box-shadow:0 0 0 2px var(--accent-glow)}
.prompt-input::placeholder{color:var(--text-dim)}
.send-btn{background:var(--accent-glow-strong);border:1px solid var(--accent-dim);color:var(--accent);padding:0 16px;border-radius:8px;font-weight:600;font-size:13px;transition:all .15s;white-space:nowrap}
.send-btn:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}

/* ── Modal ─────────────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;width:100%;max-width:400px;animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
.modal h2{font-size:15px;font-weight:600;color:var(--text-bright);margin-bottom:16px}
.modal .field{margin-bottom:12px}
.modal label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.modal .field-hint{font-size:10px;color:var(--text-dim);margin-top:2px;font-style:italic}
.modal input,.modal select{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px}
.modal input:focus,.modal select:focus{outline:none;border-color:var(--accent-dim)}
.modal select option{background:var(--surface-2);color:var(--text)}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.modal .cancel-btn{background:none;border:1px solid var(--border);color:var(--text-dim);padding:6px 14px;border-radius:6px;font-size:13px}
.modal .cancel-btn:hover{border-color:var(--text);color:var(--text)}
.modal .confirm-btn{background:var(--accent-glow-strong);border:1px solid var(--accent-dim);color:var(--accent);padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600}
.modal .confirm-btn:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}

/* ── Toast ─────────────────────────────────────────────── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.visible{opacity:1}
.toast.error{border-color:rgba(223,102,102,.3);color:var(--red)}

/* ── Mobile ────────────────────────────────────────────── */
@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .sidebar{position:absolute;inset:0;top:48px;z-index:10;transition:transform .25s ease}
  .layout.detail-open .sidebar{transform:translateX(-100%)}
  .detail{position:absolute;inset:0;top:48px;z-index:9;transform:translateX(100%);transition:transform .25s ease}
  .layout.detail-open .detail{transform:translateX(0)}
  .back-btn{display:block}
  .token-input{width:100px}
  .worker-bar{padding:8px 12px}
  .messages{padding:12px}
  .prompt-bar{padding:8px 12px}
  .prompt-input{padding:8px 12px;font-size:16px /* prevent iOS zoom */}
}
@media(max-width:360px){
  .header-logo span{display:none}
  .fleet-cost{font-size:11px}
}
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" id="backBtn" aria-label="Back">&larr;</button>
  <div class="header-logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    <span>Claude Fleet</span>
  </div>
  <div class="header-spacer"></div>
  <div class="fleet-cost" id="fleetCost"></div>
  <input class="token-input" id="tokenInput" type="password" placeholder="API token" autocomplete="off">
</div>

<div class="layout" id="layout">
  <aside class="sidebar">
    <div class="sidebar-head">
      <span>Workers</span>
      <button class="spawn-btn" id="spawnBtn">+ Spawn</button>
    </div>
    <div class="worker-list" id="workerList"></div>
    <div class="task-section" id="taskSection" style="display:none">
      <div class="sidebar-head"><span>Tasks</span></div>
      <div id="taskList"></div>
    </div>
    <div class="sidebar-footer" id="sidebarFooter"></div>
  </aside>

  <section class="detail" id="detail">
    <div class="detail-empty" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      Select a worker to view conversation
    </div>
  </section>
</div>

<!-- Spawn modal -->
<div class="modal-overlay" id="spawnModal">
  <div class="modal">
    <h2>Spawn Worker</h2>
    <div class="field"><label>Name</label><input id="spawnName" placeholder="my-worker" autocomplete="off"></div>
    <div class="field">
      <label>Provider</label>
      <select id="spawnProvider">
        <option value="">Loading...</option>
      </select>
      <div class="field-hint" id="providerHint"></div>
    </div>
    <div class="field"><label>VM Type</label>
      <select id="spawnVmType">
        <option value="">regular</option>
        <option value="snp">snp (AMD SEV-SNP)</option>
        <option value="tdx">tdx (Intel TDX)</option>
      </select>
    </div>
    <div class="field"><label>Model</label><input id="spawnModel" autocomplete="off"></div>
    <div class="field"><label>Instance type</label><input id="spawnInstance" autocomplete="off"></div>
    <div class="field"><label>Region</label><input id="spawnRegion" autocomplete="off"></div>
    <div class="actions">
      <button class="cancel-btn" id="spawnCancel">Cancel</button>
      <button class="confirm-btn" id="spawnConfirm">Spawn</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

// ── Helpers ───────────────────────────────────────────────
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function el(tag, cls, html) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (html !== undefined) {
    if (typeof html === 'string') n.innerHTML = html;
    else if (html instanceof Node) n.appendChild(html);
    else if (Array.isArray(html)) html.forEach(c => { if (c instanceof Node) n.appendChild(c); });
  }
  return n;
}

function toast(msg, isError) {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast visible' + (isError ? ' error' : '');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.className = 'toast', 3000);
}

// ── Token ─────────────────────────────────────────────────
function getToken() { return localStorage.getItem('cfleet_token') || $('#tokenInput').value || ''; }
$('#tokenInput').addEventListener('change', e => localStorage.setItem('cfleet_token', e.target.value));
{ const s = localStorage.getItem('cfleet_token'); if (s) $('#tokenInput').value = s; }

// ── API ───────────────────────────────────────────────────
async function api(path, opts = {}) {
  const token = getToken();
  const headers = opts.headers || {};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  if (opts.body && typeof opts.body === 'object') {
    headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  const res = await fetch('/api' + path, { ...opts, headers });
  if (res.status === 401) { $('#tokenInput').focus(); throw new Error('Auth required'); }
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || 'Request failed');
  }
  return res.json();
}

// ── State ─────────────────────────────────────────────────
let workers = [];
let workerCosts = {};  // name -> cost from fleet usage
let selected = null;  // worker name
let logSource = null;
let msgPollTimer = null;
let renderedMsgCount = 0;
let fleetConfig = null; // cached from /api/config
let liveStatus = {}; // name -> 'idle'|'working' from relay, survives list refreshes

// ── Worker List ───────────────────────────────────────────
async function refreshWorkers() {
  try {
    workers = await api('/workers');
    // Apply live relay statuses over stale state-file statuses
    workers.forEach(w => {
      if (liveStatus[w.name] && (w.status === 'working' || w.status === 'idle')) {
        w.status = liveStatus[w.name];
      }
    });
    renderWorkerList();
  } catch(e) { /* retry next cycle */ }
}

function renderWorkerList() {
  const list = $('#workerList');
  list.innerHTML = '';
  workers.forEach(w => {
    const item = el('div', 'worker-item' + (selected === w.name ? ' active' : ''));
    item.onclick = () => selectWorker(w.name);
    const dotCls = ({idle:'dot-idle',working:'dot-working',spawning:'dot-spawning',provisioning:'dot-provisioning',errored:'dot-errored',stopped:'dot-stopped'})[w.status] || '';
    item.innerHTML = `
      <div class="worker-dot ${dotCls}"></div>
      <div class="worker-info-col">
        <div class="worker-name">${esc(w.name)}</div>
        <div class="worker-meta">${esc(w.status)} &middot; ${esc(w.provider)}${w.model ? ' &middot; ' + esc(w.model) : ''}</div>
      </div>
      <div class="worker-cost">${(workerCosts[w.name] || w.total_cost_usd) > 0 ? '$' + (workerCosts[w.name] || w.total_cost_usd).toFixed(2) : ''}</div>`;
    list.appendChild(item);
  });
  updateFleetCost();
}

function updateFleetCost() {
  // Only show worker count here; cost is updated solely by refreshFleetCost()
  // to avoid flickering between two data sources
  const count = workers.length;
  if (count > 0) {
    if (!$('#fleetCost').innerHTML) $('#fleetCost').innerHTML = `<b>${count}</b> worker${count !== 1 ? 's' : ''}`;
    if (!$('#sidebarFooter').innerHTML) $('#sidebarFooter').innerHTML = `<b>${count}</b> worker${count !== 1 ? 's' : ''}`;
  } else {
    $('#fleetCost').textContent = 'No workers';
    $('#sidebarFooter').textContent = 'No workers running';
  }
}

// ── Tasks ─────────────────────────────────────────────────
async function refreshTasks() {
  try {
    const tasks = await api('/tasks');
    const sec = $('#taskSection');
    const list = $('#taskList');
    if (!tasks.length) { sec.style.display = 'none'; return; }
    sec.style.display = '';
    list.innerHTML = '';
    tasks.forEach(t => {
      const statusCls = 'status-' + t.status;
      list.innerHTML += `<div class="task-item"><span class="status ${statusCls}">${esc(t.status)}</span> ${esc(t.operation)} <b>${esc(t.worker_name)}</b>${t.error ? ' <span style="color:var(--red)">' + esc(t.error) + '</span>' : ''}</div>`;
    });
    return tasks.some(t => t.status === 'running');
  } catch(e) { return false; }
}

// ── Select Worker ─────────────────────────────────────────
async function selectWorker(name) {
  selected = name;
  renderedMsgCount = 0;
  renderWorkerList();
  $('#layout').classList.add('detail-open');

  const detail = $('#detail');
  detail.innerHTML = '';

  // Worker bar
  const w = workers.find(x => x.name === name) || { name, status: '...' };
  const bar = el('div', 'worker-bar', `
    <div class="worker-bar-name">${esc(name)}</div>
    <div class="worker-bar-status status-${w.status}" id="wStatus">${esc(w.status)}</div>
    <div class="worker-bar-spacer"></div>
    <div class="worker-bar-stat" id="wTokens"></div>
    <div class="worker-bar-stat" id="wCost"></div>
    <button class="bar-btn" id="infoToggle">Info</button>
    <button class="bar-btn bar-btn-warn" id="interruptBtn">Interrupt</button>
    <button class="bar-btn bar-btn-danger" id="killBtn">Kill</button>`);
  detail.appendChild(bar);

  // Info row (hidden by default)
  const info = el('div', 'info-row', '');
  info.id = 'infoRow';
  detail.appendChild(info);

  // Messages
  const msgs = el('div', 'messages', '');
  msgs.id = 'messages';
  detail.appendChild(msgs);

  // Prompt bar
  const pb = el('div', 'prompt-bar', `
    <textarea class="prompt-input" id="promptInput" placeholder="Send a prompt..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn">Send</button>`);
  detail.appendChild(pb);

  // Wire events
  $('#infoToggle').onclick = () => $('#infoRow').classList.toggle('open');
  $('#interruptBtn').onclick = interruptWorker;
  $('#killBtn').onclick = killWorker;
  $('#sendBtn').onclick = sendPrompt;
  $('#promptInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPrompt(); }
  });
  // Auto-resize textarea
  $('#promptInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  // Load data
  fetchWorkerDetail(name);
  fetchMessages(name);
  connectSSE(name);
  startMsgPoll(name);
}

async function fetchWorkerDetail(name) {
  try {
    const info = await api('/workers/' + encodeURIComponent(name));
    if (selected !== name) return;
    // Update status badge + sidebar dot
    const st = info.idle ? 'idle' : (info.status === 'working' ? 'working' : info.status);
    if (['idle','working'].includes(st)) liveStatus[name] = st;
    const badge = $('#wStatus');
    if (badge) {
      badge.textContent = st;
      badge.className = 'worker-bar-status status-' + st;
    }
    // Sync sidebar worker list with live status
    const w = workers.find(x => x.name === name);
    if (w && w.status !== st && ['idle','working'].includes(st)) {
      w.status = st;
      renderWorkerList();
    }
    // Update tokens/cost
    const inp = info.total_input_tokens || 0;
    const out = info.total_output_tokens || 0;
    const cost = info.total_cost_usd || 0;
    const tk = $('#wTokens');
    const ck = $('#wCost');
    if (tk) tk.innerHTML = inp || out ? `<b>${fmtNum(inp)}</b> in / <b>${fmtNum(out)}</b> out` : '';
    if (ck) ck.innerHTML = cost > 0 ? `<b>$${cost.toFixed(4)}</b>` : '';
    // Info row
    const row = $('#infoRow');
    if (row) {
      row.innerHTML = [
        chip('Provider', info.provider),
        chip('IP', info.ip || info.container_id?.slice(0,12)),
        chip('Model', info.model),
        chip('VM', info.vm_type),
        chip('SKU', info.instance_type),
        chip('Mode', info.communication_mode),
        chip('Uptime', info.uptime),
        chip('Session', info.session_id?.slice(0,8)),
      ].join('');
    }
  } catch(e) {}
}

function chip(label, val) {
  if (!val || val === 'unknown') return '';
  return `<span class="info-chip"><b>${esc(val)}</b> ${esc(label)}</span>`;
}

function fmtNum(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}

// ── Messages Rendering ────────────────────────────────────
async function fetchMessages(name) {
  try {
    const data = await api('/workers/' + encodeURIComponent(name) + '/messages?limit=500');
    if (selected !== name) return;
    const container = $('#messages');
    if (!container) return;
    container.innerHTML = '';
    renderedMsgCount = 0;
    const msgs = data.messages || [];
    msgs.forEach(m => appendMessage(m));
    scrollToBottom();
  } catch(e) {
    const container = $('#messages');
    if (container) container.innerHTML = `<div class="msg-system">Failed to load messages</div>`;
  }
}

function appendMessage(msg) {
  const container = $('#messages');
  if (!container) return;
  const node = renderMessage(msg);
  if (!node) return;
  container.appendChild(node);
  renderedMsgCount++;
}

function renderMessage(msg) {
  const role = msg.role;
  const type = msg.type;

  // Skip init system messages
  if (type === 'SystemMessage' && msg.subtype === 'init') return null;

  if (role === 'user') {
    const d = el('div', 'msg msg-user');
    const content = msg.content;
    if (typeof content === 'string') {
      d.appendChild(el('div', 'msg-body', esc(content)));
    } else if (Array.isArray(content)) {
      content.forEach(b => {
        if (b.type === 'TextBlock') d.appendChild(el('div', 'msg-body', esc(b.text)));
      });
    }
    return d;
  }

  if (role === 'assistant') {
    const d = el('div', 'msg msg-assistant');
    const blocks = msg.content || [];
    blocks.forEach(b => renderBlock(d, b));
    return d.children.length ? d : null;
  }

  if (role === 'result' || type === 'ResultMessage') {
    return null;
  }

  if (role === 'system') {
    const content = msg.content;
    if (typeof content === 'string' && content.trim()) {
      return el('div', 'msg msg-system', esc(content));
    }
    const blocks = Array.isArray(content) ? content : [];
    const text = blocks.filter(b => b.type === 'TextBlock').map(b => b.text).join('\n');
    if (text.trim()) return el('div', 'msg msg-system', esc(text));
    return null;
  }

  return null;
}

function renderBlock(parent, block) {
  const t = block.type;
  if (t === 'TextBlock') {
    const text = block.text || '';
    if (!text.trim()) return;
    const d = el('div', 'msg-text');
    d.innerHTML = renderMarkdown(text);
    parent.appendChild(d);
  } else if (t === 'ThinkingBlock') {
    const thinking = block.thinking || '';
    if (!thinking.trim()) return;
    const details = document.createElement('details');
    details.className = 'thinking-block';
    const preview = thinking.length > 80 ? thinking.slice(0,80) + '...' : thinking;
    details.innerHTML = `<summary>Thinking: ${esc(preview)}</summary><div class="thinking-content">${esc(thinking)}</div>`;
    parent.appendChild(details);
  } else if (t === 'ToolUseBlock') {
    const tool = block.tool_name || '?';
    const input = block.tool_input || {};
    let cmd = tool;
    if (tool === 'Bash') cmd = '$ ' + (input.command || '');
    else if (['Read','Write','Edit'].includes(tool)) cmd = (input.file_path || '');
    else if (['Glob','Grep'].includes(tool)) cmd = (input.pattern || '');
    const d = el('div', 'tool-use');
    d.innerHTML = `<span class="tool-name">${esc(tool)}</span><span class="tool-cmd">${esc(cmd)}</span>`;
    parent.appendChild(d);
  } else if (t === 'ToolResultBlock') {
    const content = block.content || '';
    const isErr = block.is_error;
    if (!content && !isErr) return;
    const details = document.createElement('details');
    details.className = 'tool-result' + (isErr ? ' tool-error' : '');
    const len = typeof content === 'string' ? content.length : JSON.stringify(content).length;
    const truncated = typeof content === 'string'
      ? (content.length > 800 ? content.slice(0,800) + '...' : content)
      : JSON.stringify(content, null, 2).slice(0, 800);
    details.innerHTML = `<summary>${isErr ? 'Error' : 'Output'} (${fmtNum(len)} chars)</summary><pre>${esc(truncated)}</pre>`;
    parent.appendChild(details);
  }
}

function renderMarkdown(text) {
  // Escape HTML first
  let html = esc(text);
  // Code blocks: ```lang\n...\n```
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code}</code></pre>`);
  // Inline code
  html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italic (but not inside URLs or already processed)
  html = html.replace(/(?<!\w)\*([^*]+)\*(?!\w)/g, '<em>$1</em>');
  return html;
}

function scrollToBottom() {
  const c = $('#messages');
  if (c) requestAnimationFrame(() => c.scrollTop = c.scrollHeight);
}

// ── SSE Connection ────────────────────────────────────────
function connectSSE(name) {
  if (logSource) { logSource.close(); logSource = null; }
  const token = getToken();
  const url = '/api/workers/' + encodeURIComponent(name) + '/logs' + (token ? '?token=' + encodeURIComponent(token) : '');
  logSource = new EventSource(url);

  logSource.addEventListener('message', e => {
    if (selected !== name) return;
    try {
      const data = JSON.parse(e.data);
      if (data.message) appendMessage(data.message);
      scrollToBottom();
    } catch(ex) {}
  });

  logSource.addEventListener('status', e => {
    if (selected !== name) return;
    try {
      const data = JSON.parse(e.data);
      const st = data.idle ? 'idle' : 'working';
      const badge = $('#wStatus');
      if (badge) {
        badge.textContent = st;
        badge.className = 'worker-bar-status status-' + st;
      }
      // Sync sidebar dot + persist
      liveStatus[name] = st;
      const w = workers.find(x => x.name === name);
      if (w && w.status !== st) { w.status = st; renderWorkerList(); }
      const tk = $('#wTokens');
      const ck = $('#wCost');
      if (tk && (data.total_input_tokens || data.total_output_tokens)) {
        tk.innerHTML = `<b>${fmtNum(data.total_input_tokens||0)}</b> in / <b>${fmtNum(data.total_output_tokens||0)}</b> out`;
      }
      if (ck && data.total_cost_usd > 0) {
        ck.innerHTML = `<b>$${data.total_cost_usd.toFixed(4)}</b>`;
      }
    } catch(ex) {}
  });

  logSource.onerror = () => {
    // EventSource auto-reconnects; no action needed
  };
}

// Periodic message sync to catch anything SSE missed
function startMsgPoll(name) {
  if (msgPollTimer) clearInterval(msgPollTimer);
  msgPollTimer = setInterval(async () => {
    if (selected !== name) { clearInterval(msgPollTimer); return; }
    try {
      const data = await api('/workers/' + encodeURIComponent(name) + '/messages?limit=500');
      const msgs = data.messages || [];
      if (msgs.length > renderedMsgCount) {
        // New messages arrived that SSE may have missed; re-render
        const container = $('#messages');
        if (!container) return;
        container.innerHTML = '';
        renderedMsgCount = 0;
        msgs.forEach(m => appendMessage(m));
        scrollToBottom();
      }
    } catch(e) {}
  }, 8000);
}

// ── Actions ───────────────────────────────────────────────
async function sendPrompt() {
  const input = $('#promptInput');
  if (!input || !selected) return;
  const prompt = input.value.trim();
  if (!prompt) return;
  input.value = '';
  input.style.height = 'auto';
  try {
    await api('/workers/' + encodeURIComponent(selected) + '/ask', {
      method: 'POST', body: { prompt }
    });
  } catch(e) {
    toast('Failed: ' + e.message, true);
  }
}

async function interruptWorker() {
  if (!selected) return;
  try {
    await api('/workers/' + encodeURIComponent(selected) + '/interrupt', { method: 'POST' });
    toast('Interrupted ' + selected);
  } catch(e) { toast('Failed: ' + e.message, true); }
}

async function killWorker() {
  if (!selected || !confirm('Destroy worker "' + selected + '"?')) return;
  try {
    await api('/workers/' + encodeURIComponent(selected), { method: 'DELETE' });
    toast('Destroying ' + selected);
    goBack();
    refreshWorkers();
    refreshTasks();
