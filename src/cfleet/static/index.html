<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2b2a27">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Claude Fleet</title>
<link rel="manifest" href="/manifest.json">
<style>
@font-face {
  font-family: 'Anthropic Sans';
  src: url('https://cdn.prod.website-files.com/67ce28cfec624e2b733f8a52/69971a00a3295036497e1a28_AnthropicSans-Roman-Web.woff2') format('woff2');
  font-weight: 300 800;
  font-style: normal;
  font-display: swap;
}
</style>
<style>
/* ── Variables ─────────────────────────────────────────── */
:root {
  --accent: #c4633a;
  --accent-dim: #ae5630;
  --accent-bright: #d97757;
  --accent-glow: rgba(196,99,58,0.08);
  --accent-glow-strong: rgba(196,99,58,0.18);
  --bg: #1f1e1b;
  --surface: #2b2a27;
  --surface-2: #393937;
  --surface-3: #45443f;
  --border: rgba(108,106,96,0.25);
  --border-light: rgba(108,106,96,0.50);
  --text: #eeeeee;
  --text-dim: #9a9893;
  --text-bright: #eeeeee;
  --green: #86e89a;
  --yellow: #ffdf61;
  --red: #df6666;
  --cyan: #7ab8ff;
  --font-mono: 'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace;
}
/* ── Reset ─────────────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:'Anthropic Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
button{font:inherit;cursor:pointer}
input,select{font:inherit}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-light)}

/* ── Header ────────────────────────────────────────────── */
.header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;min-height:48px}
.header-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;color:var(--accent-bright);letter-spacing:-0.3px;white-space:nowrap}
.header-logo svg{flex-shrink:0}
.header-spacer{flex:1}
.fleet-cost{font-size:12px;color:var(--text-dim);font-family:var(--font-mono);white-space:nowrap}
.fleet-cost b{color:var(--accent);font-weight:600}
.token-input{background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:12px;width:140px}
.token-input:focus{outline:none;border-color:var(--accent-dim)}
.back-btn{display:none;background:none;border:none;color:var(--accent);font-size:14px;padding:4px 8px}

/* ── Layout ────────────────────────────────────────────── */
.layout{flex:1;display:grid;grid-template-columns:280px 1fr;overflow:hidden}

/* ── Sidebar ───────────────────────────────────────────── */
.sidebar{display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--surface);overflow:hidden}
.sidebar-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px}
.sidebar-head span{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-dim)}
.spawn-btn{background:var(--accent-glow);border:1px solid var(--accent-dim);color:var(--accent);font-size:12px;padding:3px 10px;border-radius:6px;font-weight:500;transition:all .15s}
.spawn-btn:hover{background:var(--accent-glow-strong);border-color:var(--accent)}
.worker-list{flex:1;overflow-y:auto;padding:4px 8px}
.worker-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;transition:background .12s;border:1px solid transparent}
.worker-item:hover{background:var(--surface-2)}
.worker-item.active{background:var(--accent-glow);border-color:var(--border-light)}
.worker-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .4s}
.dot-idle{background:var(--green)}
.dot-working{background:var(--yellow);animation:pulse 1.5s ease-in-out infinite}
.dot-spawning,.dot-provisioning{background:var(--cyan);animation:pulse 1s ease-in-out infinite}
.dot-errored{background:var(--red)}
.dot-stopped{background:var(--text-dim)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.worker-info-col{flex:1;min-width:0}
.worker-name{font-weight:500;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.worker-meta{font-size:11px;color:var(--text-dim);margin-top:1px}
.worker-cost{font-size:11px;color:var(--accent-dim);font-family:var(--font-mono);flex-shrink:0}
.sidebar-footer{padding:10px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--text-dim)}
.sidebar-footer b{color:var(--accent)}

/* tasks */
.task-section{border-top:1px solid var(--border);max-height:140px;overflow-y:auto}
.task-section .sidebar-head{padding-top:8px;padding-bottom:4px}
.task-item{font-size:11px;padding:3px 14px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
.task-item .status{font-weight:500}
.task-item .status-running{color:var(--yellow)}
.task-item .status-completed{color:var(--green)}
.task-item .status-failed{color:var(--red)}

/* ── Detail Panel ──────────────────────────────────────── */
.detail{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.detail-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text-dim);font-size:14px;padding:20px}
.detail-empty svg{opacity:.3}

/* Worker bar */
.worker-bar{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap}
.worker-bar-name{font-weight:600;font-size:14px;color:var(--text-bright)}
.worker-bar-status{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.status-idle{background:rgba(134,232,154,.12);color:var(--green)}
.status-working{background:rgba(255,223,97,.12);color:var(--yellow)}
.status-spawning,.status-provisioning{background:rgba(122,184,255,.12);color:var(--cyan)}
.status-errored{background:rgba(223,102,102,.12);color:var(--red)}
.worker-bar-spacer{flex:1}
.worker-bar-stat{font-size:11px;color:var(--text-dim);font-family:var(--font-mono)}
.worker-bar-stat b{color:var(--accent);font-weight:500}
.bar-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font-size:12px;padding:4px 10px;border-radius:6px;transition:all .15s}
.bar-btn:hover{border-color:var(--text);color:var(--text)}
.bar-btn-danger:hover{border-color:var(--red);color:var(--red)}
.bar-btn-warn:hover{border-color:var(--yellow);color:var(--yellow)}

/* Info row (expandable) */
.info-row{display:none;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--surface-2);gap:16px;flex-wrap:wrap;font-size:12px}
.info-row.open{display:flex}
.info-chip{color:var(--text-dim)}
.info-chip b{color:var(--text);font-weight:500}

/* ── Messages ──────────────────────────────────────────── */
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:4px}
.msg{padding:8px 0;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg-user{border-left:3px solid var(--accent);padding-left:12px;margin:8px 0 4px}
.msg-user .msg-body{color:var(--text-bright);font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.msg-assistant .msg-text{font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg-assistant .msg-text code{background:var(--surface-3);padding:1px 5px;border-radius:3px;font-family:var(--font-mono);font-size:12px}
.msg-assistant .msg-text pre{background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin:8px 0;overflow-x:auto;font-family:var(--font-mono);font-size:12px;line-height:1.5}
.msg-assistant .msg-text pre code{background:none;padding:0}

/* thinking */
.thinking-block{margin:4px 0;border-left:2px solid var(--border);padding-left:10px}
.thinking-block summary{font-size:11px;color:var(--text-dim);cursor:pointer;user-select:none;font-style:italic}
.thinking-block summary:hover{color:var(--text)}
.thinking-block .thinking-content{font-size:12px;color:var(--text-dim);font-style:italic;line-height:1.5;white-space:pre-wrap;margin-top:4px;max-height:300px;overflow-y:auto}

/* tool use */
.tool-use{display:flex;align-items:center;gap:6px;margin:4px 0;padding:5px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;font-family:var(--font-mono);font-size:12px;overflow:hidden}
.tool-name{color:var(--cyan);font-weight:600;flex-shrink:0}
.tool-cmd{color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* tool result */
.tool-result{margin:2px 0;font-size:12px}
.tool-result summary{color:var(--text-dim);cursor:pointer;font-size:11px;font-family:var(--font-mono)}
.tool-result summary:hover{color:var(--text)}
.tool-result pre{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:8px;margin-top:4px;font-family:var(--font-mono);font-size:11px;line-height:1.4;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;color:var(--text-dim)}
.tool-error summary{color:var(--red)}
.tool-error pre{border-color:rgba(223,102,102,.2);color:var(--red)}

/* result summary */
.msg-result{text-align:center;padding:4px 0;margin:4px 0}
.result-line{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-family:var(--font-mono);color:var(--text-dim);padding:3px 12px;background:var(--surface-2);border-radius:10px}
.result-line .cost{color:var(--accent)}

/* system */
.msg-system{font-size:11px;color:var(--text-dim);padding:2px 0;font-style:italic}

/* ── Prompt Bar ────────────────────────────────────────── */
.prompt-bar{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.prompt-input{flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:14px;resize:none;min-height:42px;max-height:120px;line-height:1.4}
.prompt-input:focus{outline:none;border-color:var(--accent-dim);box-shadow:0 0 0 2px var(--accent-glow)}
.prompt-input::placeholder{color:var(--text-dim)}
