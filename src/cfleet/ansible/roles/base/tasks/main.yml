---
# System dependencies — adapted from claude-dev reference role.
# Installs everything needed for Claude Code to work on a fresh Ubuntu 24.04 VM.

- name: Install system packages
  ansible.builtin.apt:
    name:
      - git
      - curl
      - rsync
      - build-essential
      - tmux
      - ripgrep
      - fd-find
      - jq
      - wget
      - unzip
      - libssl-dev
      - pkg-config
    state: present
    update_cache: true
  become: true

- name: Check tmux version
  ansible.builtin.shell: tmux -V 2>/dev/null | grep -oP '[\d.]+' || echo "0"
  register: tmux_version
  changed_when: false

- name: Install tmux 3.5a if version < 3.3
  when: tmux_version.stdout is version('3.3', '<')
  become: true
  block:
    - name: Install FUSE for AppImage support
      ansible.builtin.apt:
        name: libfuse2
        state: present

    - name: Download prebuilt tmux AppImage
      ansible.builtin.get_url:
        url: https://github.com/nelsonenzo/tmux-appimage/releases/download/3.5a/tmux.appimage
        dest: /usr/local/bin/tmux
        mode: "0755"
        force: true

- name: Configure tmux
  ansible.builtin.copy:
    dest: "/home/{{ ansible_user }}/.tmux.conf"
    owner: "{{ ansible_user }}"
    mode: "0644"
    content: |
      # --- Core ---
      set -g mouse on
      set -g history-limit 50000
      set -s escape-time 0
      set -g default-terminal "tmux-256color"
      set -ag terminal-overrides ",xterm-256color:RGB"
      set -g focus-events on

      # --- Clipboard (OSC 52) ---
      set -s set-clipboard on
      set -g allow-passthrough on
      set -s copy-command 'printf "\033]52;c;$(base64)\a" > /dev/tty'
      bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear 'printf "\033]52;c;$(base64)\a" > /dev/tty'
      bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-no-clear 'printf "\033]52;c;$(base64)\a" > /dev/tty'

      # --- Vi copy mode ---
      setw -g mode-keys vi
      bind -T copy-mode-vi v send-keys -X begin-selection
      bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'printf "\033]52;c;$(base64)\a" > /dev/tty'

      # --- Pane navigation ---
      bind h select-pane -L
      bind j select-pane -D
      bind k select-pane -U
      bind l select-pane -R
      bind -r H resize-pane -L 5
      bind -r J resize-pane -D 5
      bind -r K resize-pane -U 5
      bind -r L resize-pane -R 5

      # --- Windows ---
      set -g renumber-windows on
      set -g base-index 1
      setw -g pane-base-index 1

      # --- Status bar ---
      set -g status-interval 5
      set -g status-style "bg=#1a1b26,fg=#a9b1d6"
      set -g status-left "#[bold]#S "
      set -g status-right "#H | %H:%M"

      # --- Activity monitoring ---
      setw -g monitor-activity on
      set -g visual-activity off
  become: true

# Node.js — Claude Code needs it for npm-based MCP servers
- name: Check if Node.js is installed
  ansible.builtin.command: node --version
  register: node_check
  changed_when: false
  failed_when: false

- name: Install Node.js 22.x
  when: node_check.rc != 0
  block:
    - name: Download NodeSource setup script
      ansible.builtin.get_url:
        url: https://deb.nodesource.com/setup_22.x
        dest: /tmp/nodesource_setup.sh
        mode: "0755"

    - name: Run NodeSource setup
      ansible.builtin.command: bash /tmp/nodesource_setup.sh
      become: true

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        state: present
      become: true
